; BrailleWave trainer
;   USB CDC -> PC serial monitor

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
build_flags = -DCONFIG_LWIP_DHCP_RESTORE_LAST_IP=0 -DARDUINO_LOOP_STACK_SIZE=16384
lib_deps =
    bblanchon/ArduinoJson@^7
    mathieucarbou/ESPAsyncWebServer@^3
board_build.filesystem = littlefs

; GPIO 7 (TX) -> MAX232 RX -> DB9 -> BrailleWave
; GPIO 6 (RX) <- MAX232 TX <- DB9 <- BrailleWave
[env:esp32-s3-devkitc-1]
board = esp32-s3-devkitc-1
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
build_flags = ${env.build_flags} -DARDUINO_USB_CDC_ON_BOOT=1 -DBRL_TX=7 -DBRL_RX=6 -DLED_RGB=48

; D1/A1 (GPIO2, TX) -> MAX232 RX -> DB9 -> BrailleWave
; D2/A2 (GPIO3, RX) <- MAX232 TX <- DB9 <- BrailleWave
[env:xiao_esp32s3]
board = seeed_xiao_esp32s3
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
build_flags = ${env.build_flags} -DBRL_TX=2 -DBRL_RX=3 -DLED_PIN=21
